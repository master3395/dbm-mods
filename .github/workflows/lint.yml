name: Lint

on:
  pull_request:
  push:
    branches:
      - master
    paths:
      - actions
      - events
      - extensions
      - sharder
      - bot.ts
      - types.ts

jobs:
  lint:
    name: ESLint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Supported range: Node 22–26 (see package.json engines). Odd majors (23, 25) are covered by semver range; CI uses LTS/current anchors.
        node-version: [22, 24, 26]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (JS + TS)
        run: npm run lint:all

      - name: Run Prettier
        run: npm run prettier:check
